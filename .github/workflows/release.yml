name: Auto-Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install PlatformIO & Build Binaries
      run: |
        pip install platformio
        pio run
        pio run -t buildfs

    - name: Install Pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Setup Typst
      uses: typst-community/setup-typst@v5

    # Convert, name, and package assets dynamically
    - name: Package Assets
      run: |
        mkdir -p staging_release
        
        # Fetch environment context variables completely dynamically
        VERSION="${{ github.ref_name }}"
        CURRENT_DATE=$(date +'%Y-%m-%d')
        REPO_NAME="${{ github.repository }}"
        REPO_URL="${{ github.server_url }}/${{ github.repository }}"
        
        # 1. Dynamically generate the top metadata table layout (Zero hardcoding)
        cat << EOF > metadata_header.md
        # QRPickle Field Manual & System Documentation
        
        | Project Property | System Specification |
        | :--- | :--- |
        | **Firmware Package** | QRPickle Tracker Dashboard |
        | **Software Version** | ${VERSION} |
        | **Compilation Date** | ${CURRENT_DATE} |
        | **Target Hardware** | ESP32 Cheap Yellow Display (CYD) |
        | **Source Repository** | [${REPO_NAME}](${REPO_URL}) |
        | **Primary License** | MIT License |
        
        ---
        
        EOF
        
        # 2. Concat header and README into a temporary compilation file
        cat metadata_header.md README.md > temp_doc.md
        
        # 3. Convert Markdown to a Typst structural markup file
        pandoc temp_doc.md -o temp_doc.typ
        
        # 4. FIX: Map the Pandoc rule token to a native Typst line element
        sed -i 's/#horizontalrule/#line(length: 100%, stroke: 0.5pt)/g' temp_doc.typ
        
        # 5. Compile the flawless, native PDF with appended version
        typst compile temp_doc.typ "staging_release/QRPickle_Documentation_${VERSION}.pdf"
        
        # 6. Copy over the generated system binaries
        find .pio/build/ -name "*.bin" -exec cp {} staging_release/ \;
        
        # 7. Compress everything cleanly into a version-appended ZIP file
        zip -j "QRPickle_Release_${VERSION}.zip" staging_release/*

    # 3. Create the Release Page and attach the versioned ZIP file
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: QRPickle_Release_${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}