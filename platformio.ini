; ==============================================================================
; FoxClock Project Global Configuration
; Sets the default target firmware environment to the CYD board module
; ==============================================================================
[platformio]
default_envs = cyd

; ==============================================================================
; Target Environment: Cheap Yellow Display (CYD) Firmware Pipeline
; Configures ESP32 flashing speeds, dependencies (LVGL v9), and pre/post scripts
; ==============================================================================
[env:cyd]
platform              = espressif32 @ ^6.5.0
board                 = esp32dev
framework             = arduino
board_build.partitions= partitions.csv
board_build.filesystem= littlefs
monitor_speed         = 115200
upload_speed          = 921600

; Project Application Library Dependencies
lib_deps =
    lvgl/lvgl @ ^9.2.0
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson @ ^7.0.4
    ESP32Async/AsyncTCP @ ^3.2.0
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; Compilation Build Flags:
; - CORE_DEBUG_LEVEL=1: Shows essential system error messages over serial
; - USER_SETUP_LOADED=1: Informs TFT_eSPI to use an external configurations file
; - include: Directs the compiler to inject your custom hardware header file
; - LV_CONF_PATH: Explicitly points the engine to your LVGL configuration path
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSER_SETUP_LOADED=1
    -include "src/hw/User_Setup.h"
    -DLV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
    -D LV_FONT_MONTSERRAT_24=1
    -D LV_FONT_MONTSERRAT_32=1

; Python Automation Scripts for Assets Gzip, Secret Checks, and Binary Sizing
extra_scripts =
    pre:scripts/gzip_data.py
    pre:scripts/check_secrets.py
    post:scripts/check_size.py

; ==============================================================================
; Target Environment: Native Desktop Unit Testing
; Executes localized parsing, scheduling, and configuration verification logic
; ==============================================================================
[env:native]
platform        = native
test_framework  = unity
build_flags     = -std=c++17 -DUNIT_TEST
test_filter     = test_parsers/* test_scheduler/* test_config/*